---
# Rename file to secrets.yml to get started for development or test.

development:
  API_URL: http://localhost:3000/api/v1
  APP_URL: http://localhost:9292
  GOOGLE_CLIENT_ID: <set in Google OAuth console>
  GOOGLE_CLIENT_SECRET: <set in Google OAuth console>
  GOOGLE_REDIRECT_URI: http://localhost:9292/auth/sso/google/callback
  GOOGLE_OAUTH_SCOPE: openid email profile
  SESSION_SECRET: <use `rake generate:session_secret`>
  MSG_KEY: <use `rake newkey:msg`>
  SIGNING_KEY: <use `rake newkey:signing`; give VERIFY_KEY to the API>
  REDISCLOUD_URL: redis://localhost:6379/0

test:
  API_URL: http://localhost:3000/api/v1
  APP_URL: http://localhost:9292
  GOOGLE_CLIENT_ID: test-google-client-id
  GOOGLE_CLIENT_SECRET: test-google-client-secret
  GOOGLE_REDIRECT_URI: http://localhost:9292/auth/sso/google/callback
  GOOGLE_OAUTH_SCOPE: openid email profile
  SESSION_SECRET: <use `rake generate:session_secret`>
  MSG_KEY: <use `rake newkey:msg`>
  SIGNING_KEY: <use `rake newkey:signing`; give VERIFY_KEY to the API>
  REDISCLOUD_URL: redis://localhost:6379/0

production:
  API_URL: <set to production API root ending in /api/v1>
  APP_URL: <set to production app URL>
  GOOGLE_CLIENT_ID: <set in Google OAuth console>
  GOOGLE_CLIENT_SECRET: <set in Google OAuth console>
  GOOGLE_REDIRECT_URI: <set to https://your-app-domain/auth/sso/google/callback>
  GOOGLE_OAUTH_SCOPE: openid email profile
  SESSION_SECRET: <use `rake generate:session_secret`>
  MSG_KEY: <use `rake newkey:msg`>
  SIGNING_KEY: <use `rake newkey:signing`; give VERIFY_KEY to the API>
  REDISCLOUD_URL: <set by `rediscloud` add-on>
